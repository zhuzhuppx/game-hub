<!DOCTYPE html><html lang="zh-CN"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<link rel="icon" href="/favicon.ico" sizes="any">
<title>井字棋</title><script src="/sfx.js"></script><style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#ccc;font-family:system-ui,-apple-system,sans-serif;min-height:100dvh;display:flex;align-items:center;justify-content:center}
.wrap{display:flex;flex-direction:column;align-items:center;gap:10px;padding:12px;width:100%;max-width:360px}
.hdr{display:flex;align-items:center;justify-content:space-between;width:100%;padding:0 4px}
.hdr h1{font-size:20px;color:#ff8844}
.hdr .s{display:flex;gap:12px}
.hdr .s .l{font-size:11px;color:#6666aa}.hdr .s .v{font-size:18px;font-weight:700;color:#fff}
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;width:100%;max-width:300px;aspect-ratio:1}
.cell{background:rgba(255,255,255,0.03);border:1px solid rgba(255,136,68,0.15);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:48px;font-weight:700;cursor:pointer;touch-action:manipulation;aspect-ratio:1;-webkit-tap-highlight-color:transparent;transition:background .15s}
.cell:active{background:rgba(255,136,68,0.1)}
.cell.x{color:#ff8844}.cell.o{color:#88ddff}
.stats{display:flex;gap:20px;font-size:14px;color:#6666aa}
.stats span{text-align:center}
.stats .num{font-size:22px;font-weight:700;color:#fff}
.msg{font-size:16px;color:#8888bb;min-height:24px;text-align:center}
.btn{padding:8px 24px;border:none;border-radius:8px;background:rgba(255,136,68,0.15);color:#ff8844;font-size:14px;cursor:pointer;touch-action:manipulation}
.btn:active{background:rgba(255,136,68,0.25)}
.back{color:#8888cc;text-decoration:none;font-size:14px;position:absolute;bottom:12px;left:12px;z-index:100;background:rgba(0,0,0,0.4);padding:4px 10px;border-radius:6px;backdrop-filter:blur(4px)}
.back:hover{color:#8888bb}</style>
<div class="wrap">
<div class="hdr"><h1>❌ 井字棋</h1><div class="s"><div><div class="l">你</div><div class="v" id="ps">0</div></div><div><div class="l">AI</div><div class="v" id="as">0</div></div></div></div>
<div class="board" id="board"></div>
<div class="msg" id="msg">你的回合 (❌)</div>
<button class="btn" onclick="resetGame()">🔄 重新开始</button>
<a class="back" href="/">← 返回</a></div>
<script>
var board=[], turn='x', gameOver=false, pScore=0, aScore=0;
function initBoard(){board=[];for(var i=0;i<9;i++)board[i]=null;turn='x';gameOver=false}
function render(){
var b=document.getElementById('board');b.innerHTML='';
for(var i=0;i<9;i++){var c=document.createElement('div');c.className='cell'+(board[i]?' '+board[i]:'');c.textContent=board[i]||'';c.onclick=function(n){return function(){clickCell(n)};}(i);b.appendChild(c)}
document.getElementById('msg').textContent=gameOver?(checkWin('x')?'你赢了！🎉':checkWin('o')?'AI赢了...😅':'平局！'):(turn==='x'?'你的回合 (❌)':'AI思考中...');
}
function checkWin(p){var w=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];for(var i=0;i<w.length;i++){if(board[w[i][0]]===p&&board[w[i][1]]===p&&board[w[i][2]]===p)return true}return false}
function isFull(){for(var i=0;i<9;i++)if(!board[i])return false;return true}
function clickCell(i){if(gameOver||turn!=='x'||board[i])return;board[i]='x';if(checkWin('x')){gameOver=true;pScore++;document.getElementById('ps').textContent=pScore;render();return}
if(isFull()){gameOver=true;render();return}
turn='o';render();setTimeout(aiMove,200)}
function aiMove(){if(gameOver)return;var best=-1,bestScore=-Infinity;for(var i=0;i<9;i++){if(board[i])continue;board[i]='o';var s=minimax(board,0,false);board[i]=null;if(s>bestScore){bestScore=s;best=i}}
board[best]='o';if(checkWin('o')){gameOver=true;aScore++;document.getElementById('as').textContent=aScore;turn='x';render();return}
if(isFull()){gameOver=true;turn='x';render();return}
turn='x';render()}
function minimax(b,d,isMax){var w=checkWin('o'),l=checkWin('x');if(w)return 10-d;if(l)return d-10;if(isFull())return 0
if(isMax){var best=-Infinity;for(var i=0;i<9;i++){if(b[i])continue;b[i]='o';best=Math.max(best,minimax(b,d+1,false));b[i]=null}return best}else{var best=Infinity;for(var i=0;i<9;i++){if(b[i])continue;b[i]='x';best=Math.min(best,minimax(b,d+1,true));b[i]=null}return best}}
function resetGame(){initBoard();render()}
initBoard();render()
</script></html>
